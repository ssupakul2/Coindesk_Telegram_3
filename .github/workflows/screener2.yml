name: Crypto Screener A+B+C

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # เพิ่ม requests[socks] กรณีต้องใช้ Proxy ผ่าน library
        pip install requests[socks] pandas numpy urllib3

    # ========================================================
    # VPN Setup (คงเดิม)
    # ========================================================
    - name: Connect to ProtonVPN via OpenVPN
      env:
        OPENVPN_CONFIG:   ${{ secrets.OPENVPN_CONFIG }}
        PROTON_USER:      ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS:      ${{ secrets.PROTON_PASSWORD }}
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y openvpn
        echo "$OPENVPN_CONFIG" > protonvpn.ovpn
        echo -e "$PROTON_USER\n$PROTON_PASS" > pass.txt
        sed -i 's/auth-user-pass/auth-user-pass pass.txt/' protonvpn.ovpn
        sudo openvpn --config protonvpn.ovpn --daemon
        
        echo "Waiting for VPN tunnel..."
        for i in $(seq 1 30); do
          ip link show tun0 2>/dev/null && break
          sleep 1
        done

    # ========================================================
    # Run Screener (เพิ่ม env ครบถ้วน)
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        # หากคุณตั้ง Proxy URL ไว้ใน secrets ให้เพิ่มบรรทัดนี้:
        # PROXY_URL: ${{ secrets.PROXY_URL }} 
      run: python screener.py

    # ========================================================
    # Upload Logs (เพิ่มขั้นตอนนี้เพื่อดูผลย้อนหลัง)
    # ========================================================
    - name: Upload Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: screener-logs
        path: |
          *.log
          # หากสคริปต์มีการเซฟไฟล์สถานะ ให้ใส่ path เพิ่มที่นี่

    - name: Disconnect VPN Safely
      if: always()
      run: sudo pkill openvpn || true
