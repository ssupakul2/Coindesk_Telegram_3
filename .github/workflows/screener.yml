name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ใช้ Snap ติดตั้ง ProtonVPN (เสถียรกว่า apt สำหรับ GitHub Actions)
    # ========================================================
    - name: Setup and Install ProtonVPN via Snap
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # ติดตั้งผ่าน snap ซึ่งจัดการเรื่อง Path ได้ดีกว่า
        sudo snap install proton-vpn-cli
        
        # ล็อกอิน
        echo "$PROTON_PASS" | sudo proton-vpn-cli login --username "$PROTON_USER" --password-stdin
        
        # เชื่อมต่อ
        sudo proton-vpn-cli connect --fastest

    # ========================================================
    # ประมวลผล
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo proton-vpn-cli disconnect || true
