name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # แก้ไขปัญหา GPG Error และติดตั้ง ProtonVPN
    # ========================================================
    - name: Setup ProtonVPN (GPG Fix & Install)
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. ล้างคลังเก็บของเก่าออกให้หมดเพื่อป้องกัน Error 100
        sudo rm -f /etc/apt/sources.list.d/protonvpn.list
        sudo rm -f /etc/apt/sources.list.d/protonvpn-stable.list
        sudo rm -f /etc/apt/trusted.gpg.d/protonvpn.asc
        
        # 2. ติดตั้ง Key ใหม่ล่าสุดลงในระบบ keyring ที่ปลอดภัย
        sudo mkdir -p /etc/apt/keyrings
        curl -fsSL https://repo.protonvpn.com/debian/public_key.asc | sudo gpg --dearmor -o /etc/apt/keyrings/protonvpn.gpg
        
        # 3. สร้างไฟล์ Repository ใหม่ที่บังคับใช้ Key ตัวนี้เท่านั้น
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/protonvpn.gpg] https://repo.protonvpn.com/debian stable main" | sudo tee /etc/apt/sources.list.d/protonvpn.list > /dev/null
        
        # 4. อัปเดตและติดตั้งโปรแกรม
        sudo apt-get update
        sudo apt-get install -y proton-vpn-cli
        
        # 5. ล็อกอินและเชื่อมต่อแบบอัตโนมัติ
        echo "$PROTON_PASS" | sudo protonvpn-cli login --username "$PROTON_USER" --password-stdin
        sudo protonvpn-cli connect --fastest

    # ========================================================
    # รันสคริปต์หลัก
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # ปิดการเชื่อมต่อ
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo protonvpn-cli disconnect || true
