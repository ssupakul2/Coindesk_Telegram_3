name: CryptoCompare 3 All Report

on:
  # รับแรงสะกิดผ่าน API จากบริการภายนอก
  repository_dispatch:
    types: [trigger-screener]
    
  workflow_dispatch: # ยังเก็บไว้เผื่อกดรันเองแบบ Manual ได้

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py
