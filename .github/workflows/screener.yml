name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ขั้นตอนการจัดเตรียมและติดตั้ง ProtonVPN อย่างถูกต้อง
    # ========================================================
    - name: Setup and Install ProtonVPN
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. จัดการ GPG Key และ Repository
        sudo mkdir -p /etc/apt/keyrings
        sudo curl -fsSL https://repo.protonvpn.com/debian/public_key.asc | sudo gpg --yes --dearmor -o /etc/apt/keyrings/protonvpn.gpg
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/protonvpn.gpg] https://repo.protonvpn.com/debian stable main" | sudo tee /etc/apt/sources.list.d/protonvpn.list > /dev/null
        sudo apt-get update
        
        # 2. ติดตั้งตัวโปรแกรม (ใช้ชื่อแพ็กเกจ proton-vpn-cli)
        sudo apt-get install -y proton-vpn-cli
        
        # 3. ตรวจสอบ Path ของคำสั่ง
        VPN_CMD=$(which protonvpn-cli)
        echo "VPN Command found at: $VPN_CMD"
        
        # 4. ล็อกอินและเชื่อมต่อ (ใช้ password-stdin สำหรับ automation)
        echo "$PROTON_PASS" | sudo $VPN_CMD login --username "$PROTON_USER" --password-stdin
        sudo $VPN_CMD connect --fastest
        
        # 5. ยืนยัน Network
        echo "=== Current IP Address AFTER VPN Connected ==="
        curl -s https://ifconfig.me
        echo ""

    # ========================================================
    # ขั้นตอนการเริ่มประมวลผลระบบสแกนเนอร์บอต
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # มาตรการตัดสัญญาณอัตโนมัติเมื่อกระบวนการสิ้นสุด
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        VPN_CMD=$(which protonvpn-cli)
        if [ -f "$VPN_CMD" ]; then
          sudo $VPN_CMD disconnect || true
        fi
