name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ขั้นตอนการติดตั้งแบบชัวร์ที่สุด (Force Path & GPG Fix)
    # ========================================================
    - name: Setup and Install ProtonVPN
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. จัดการคีย์ให้สะอาดก่อนติดตั้ง
        sudo mkdir -p /etc/apt/keyrings
        curl -fsSL https://repo.protonvpn.com/debian/public_key.asc | sudo gpg --dearmor -o /etc/apt/keyrings/protonvpn.gpg
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/protonvpn.gpg] https://repo.protonvpn.com/debian stable main" | sudo tee /etc/apt/sources.list.d/protonvpn.list > /dev/null
        
        # 2. อัปเดตและติดตั้ง
        sudo apt-get update
        sudo apt-get install -y proton-vpn-cli
        
        # 3. บังคับอัปเดต Path ให้รู้จักคำสั่งใหม่ (hash -r)
        hash -r
        
        # 4. ตรวจสอบชื่อคำสั่งที่ถูกต้อง (พยายามหาใน /usr/bin)
        if command -v protonvpn-cli &> /dev/null; then
            VPN_CMD="protonvpn-cli"
        elif command -v protonvpn &> /dev/null; then
            VPN_CMD="protonvpn"
        else
            # ถ้าไม่เจอให้ลองหาจากไฟล์ทั้งหมดที่ขึ้นต้นด้วย proton
            VPN_CMD=$(find /usr/bin -name "proton*" | head -n 1)
        fi
        
        echo "Using VPN command: $VPN_CMD"
        
        # 5. ล็อกอินและเชื่อมต่อ
        echo "$PROTON_PASS" | sudo $VPN_CMD login --username "$PROTON_USER" --password-stdin
        sudo $VPN_CMD connect --fastest

    # ========================================================
    # รันสคริปต์
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # ตัดสัญญาณ
    # ========================================================
    - name: Disconnect VPN
      if: always()
      run: |
        # ใช้คำสั่งเดิมที่ตรวจสอบได้เพื่อ disconnect
        VPN_CMD=$(find /usr/bin -name "proton*" | head -n 1)
        sudo $VPN_CMD disconnect || true
