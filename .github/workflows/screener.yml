name: Crypto Screener A+B+C

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    # ========================================================
    # Step 1: Checkout
    # ========================================================
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ========================================================
    # Step 2: Python Setup & Caching
    # ========================================================
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy 

    # ========================================================
    # Step 3: VPN Connection
    # ========================================================
    - name: Connect to ProtonVPN via OpenVPN
      env:
        OPENVPN_CONFIG:   ${{ secrets.OPENVPN_CONFIG }}
        PROTON_USER:      ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS:      ${{ secrets.PROTON_PASSWORD }}
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y openvpn

        echo "$OPENVPN_CONFIG" > protonvpn.ovpn
        echo -e "$PROTON_USER\n$PROTON_PASS" > pass.txt
        sed -i 's/auth-user-pass/auth-user-pass pass.txt/' protonvpn.ovpn

        sudo openvpn --config protonvpn.ovpn --daemon

        echo "Waiting for VPN tunnel (tun0)..."
        for i in $(seq 1 30); do
          ip link show tun0 2>/dev/null && break
          sleep 1
        done

        if ip link show tun0 2>/dev/null; then
          echo "✅ VPN connected"
          curl -s https://ifconfig.me && echo ""
        else
          echo "❌ VPN failed to establish tun0 — aborting"
          exit 1
        fi

    # ========================================================
    # Step 4: Debug — ตรวจสอบ Network + API 3 แหล่ง (A+B+C)
    # ========================================================
    - name: Debug API Connectivity (Binance, CryptoCompare, CoinGecko)
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
      run: |
        python3 - <<'EOF'
        import os, sys, requests, pandas as pd

        CC_KEY = str(os.getenv("CRYPTOCOMPARE_API_KEY") or "").strip()
        BINANCE_ENDPOINTS = [
            "https://api.binance.com",
            "https://api3.binance.com",
            "https://api1.binance.com",
            "https://api2.binance.com",
        ]

        print("=" * 65)
        print("DEBUG: API Connectivity Check (A+B+C Engine)")
        print("=" * 65)

        # --- CryptoCompare Key Check ---
        if CC_KEY:
            print(f"✅ CRYPTOCOMPARE_API_KEY โหลดได้ ({CC_KEY[:6]}...)")
        else:
            print("⚠️  CRYPTOCOMPARE_API_KEY ไม่พบ (จะใช้ free tier)")

        # --- A. Binance ---
        print("\n--- A. Binance Endpoints ---")
        binance_ok = False
        for base in BINANCE_ENDPOINTS:
            try:
                r = requests.get(
                    f"{base}/api/v3/klines",
                    params={"symbol": "BTCUSDT", "interval": "4h", "limit": 5},
                    timeout=10,
                )
                if r.status_code == 200:
                    rows = len(r.json())
                    print(f"  ✅ {base} → HTTP 200 ({rows} rows)")
                    binance_ok = True
                    break
                else:
                    print(f"  ❌ {base} → HTTP {r.status_code}")
            except Exception as e:
                print(f"  ❌ {base} → {e}")

        # --- B. CryptoCompare ---
        print("\n--- B. CryptoCompare (Fallback) ---")
        cc_ok = False
        params_h = {"fsym": "BTC", "tsym": "USD", "limit": 2}
        if CC_KEY:
            params_h["api_key"] = CC_KEY
        try:
            r = requests.get(
                "https://min-api.cryptocompare.com/data/v2/histohour",
                params=params_h, timeout=15,
            )
            j = r.json()
            if j.get("Response", "") == "Success":
                print(f"  ✅ CryptoCompare → HTTP {r.status_code} | Response=Success")
                cc_ok = True
            else:
                print(f"  ❌ CryptoCompare → HTTP {r.status_code} | Message={j.get('Message','')}")
        except Exception as e:
            print(f"  ❌ CryptoCompare Exception: {e}")

        # --- C. CoinGecko ---
        print("\n--- C. CoinGecko (Fallback) ---")
        cg_ok = False
        try:
            r = requests.get("https://api.coingecko.com/api/v3/ping", timeout=10)
            if r.status_code == 200:
                print(f"  ✅ CoinGecko → HTTP 200 (Ping OK)")
                cg_ok = True
            else:
                print(f"  ❌ CoinGecko → HTTP {r.status_code}")
        except Exception as e:
            print(f"  ❌ CoinGecko Exception: {e}")

        # --- Summary ---
        print("\n--- Summary ---")
        if not binance_ok and not cc_ok and not cg_ok:
            print("🚨 API เชื่อมต่อไม่ได้เลยทั้ง 3 แหล่ง — ระบบจะสแกนไม่ได้ 0 coins")
            sys.exit(1)
        else:
            print(f"✅ สถานะ Engine: Binance=[{'OK' if binance_ok else 'FAIL'}] | CC=[{'OK' if cc_ok else 'FAIL'}] | CG=[{'OK' if cg_ok else 'FAIL'}]")
        print("=" * 65)
        EOF

    # ========================================================
    # Step 5: Run Screener
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # Step 6: Disconnect VPN
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo pkill openvpn || true
        echo "VPN disconnected"
