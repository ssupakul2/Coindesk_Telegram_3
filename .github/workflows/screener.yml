name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ขั้นตอนการติดตั้ง ProtonVPN แบบ Official ที่ถูกต้อง
    # ========================================================
    - name: Install ProtonVPN Official
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. ดาวน์โหลดและติดตั้งตัวจัดการ Repo ของ ProtonVPN
        # วิธีนี้จะจัดการเรื่อง GPG Key ที่หายไปให้โดยอัตโนมัติ
        wget https://repo.protonvpn.com/debian/dists/stable/main/binary-all/protonvpn-stable-release_1.0.6_all.deb
        sudo dpkg -i protonvpn-stable-release_1.0.6_all.deb
        
        # 2. อัปเดตรายการแพ็กเกจ
        sudo apt-get update
        
        # 3. ติดตั้งโปรแกรม
        sudo apt-get install -y proton-vpn-cli
        
        # 4. ล็อกอินแบบ Automation
        echo "$PROTON_PASS" | sudo protonvpn-cli login --username "$PROTON_USER" --password-stdin
        
        # 5. เชื่อมต่อ
        sudo protonvpn-cli connect --fastest

    # ========================================================
    # ประมวลผล
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # ปิดการเชื่อมต่อ
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo protonvpn-cli disconnect || true
