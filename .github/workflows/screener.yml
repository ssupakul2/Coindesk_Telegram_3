name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ขั้นตอนการติดตั้งและเชื่อมต่อ ProtonVPN
    # ========================================================
    - name: Setup and Install ProtonVPN
      env:
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. ติดตั้ง Repo และ Key (ตามที่คุณทำไว้)
        sudo mkdir -p /etc/apt/keyrings
        sudo curl -fsSL https://repo.protonvpn.com/debian/public_key.asc | sudo gpg --yes --dearmor -o /etc/apt/keyrings/protonvpn.gpg
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/protonvpn.gpg] https://repo.protonvpn.com/debian stable main" | sudo tee /etc/apt/sources.list.d/protonvpn.list > /dev/null
        sudo apt-get update
        
        # 2. **ส่วนที่ขาดไป: ต้องสั่งติดตั้งแพ็กเกจ**
        sudo apt-get install -y proton-vpn-cli
        
        # 3. ล็อกอิน (ใช้โหมด non-interactive สำหรับ CI/CD)
        # หมายเหตุ: proton-vpn-cli เวอร์ชันใหม่ใช้คำสั่งนี้
        echo "$PROTON_PASS" | sudo protonvpn-cli login --username "$PROTON_USER" --password-stdin
        
        # 4. เชื่อมต่อ
        sudo protonvpn-cli connect --fastest

    # ========================================================
    # ขั้นตอนการเริ่มประมวลผล
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # ตัดการเชื่อมต่อ
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo protonvpn-cli disconnect || true
