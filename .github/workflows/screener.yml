name: CryptoCompare 3 All Report

on:
  repository_dispatch:
    types: [trigger-screener]
  workflow_dispatch:

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas numpy

    # ========================================================
    # ขั้นตอนการเชื่อมต่อด้วย OpenVPN (เสถียรและแน่นอนที่สุด)
    # ========================================================
    - name: Connect to ProtonVPN via OpenVPN
      env:
        OPENVPN_CONFIG: ${{ secrets.OPENVPN_CONFIG }}
        PROTON_USER: ${{ secrets.PROTON_USERNAME }}
        PROTON_PASS: ${{ secrets.PROTON_PASSWORD }}
      run: |
        # 1. ติดตั้ง OpenVPN
        sudo apt-get update
        sudo apt-get install -y openvpn
        
        # 2. สร้างไฟล์ Config
        echo "$OPENVPN_CONFIG" > protonvpn.ovpn
        
        # 3. สร้างไฟล์ auth (สำหรับ Username/Password)
        echo -e "$PROTON_USER\n$PROTON_PASS" > pass.txt
        
        # 4. แก้ไขไฟล์ config ให้ดึงไฟล์ pass.txt อัตโนมัติ
        sed -i 's/auth-user-pass/auth-user-pass pass.txt/' protonvpn.ovpn
        
        # 5. สั่งเชื่อมต่อในเบื้องหลัง (Background)
        sudo openvpn --config protonvpn.ovpn --daemon
        
        # 6. รอให้เชื่อมต่อสำเร็จ
        echo "Waiting for VPN connection..."
        sleep 10
        curl -s https://ifconfig.me
        echo ""

    # ========================================================
    # รันสคริปต์
    # ========================================================
    - name: Run Crypto Screener Script
      env:
        CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    # ========================================================
    # ตัดสัญญาณอัตโนมัติ
    # ========================================================
    - name: Disconnect VPN Safely
      if: always()
      run: |
        sudo pkill openvpn
