name: Crypto Screener (4H)

on:
  repository_dispatch:
    types: [trigger-screener]
#  workflow_dispatch:
  
# on:
  #schedule:
   # - cron: "5 */4 * * *"   # ทุก 4 ชั่วโมง (ตาม timeframe ของสัญญาณ)
  workflow_dispatch: {}

# จำเป็นสำหรับให้ workflow commit ไฟล์ positions.json กลับเข้า repo ได้
permissions:
  contents: write

concurrency:
  group: crypto-screener
  cancel-in-progress: false   # ห้ามให้สอง run ทับ positions.json พร้อมกัน

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run screener
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CRYPTOCOMPARE_API_KEY: ${{ secrets.CRYPTOCOMPARE_API_KEY }}
          POSITIONS_FILE: positions.json
        run: python screener.py

      # commit positions.json กลับเข้า repo เพื่อให้ run ครั้งถัดไปอ่านสถานะต่อได้
      - name: Commit updated positions.json
        run: |
          git config user.name "crypto-screener-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -f positions.json ]; then
            git add positions.json
            # ถ้าไม่มีอะไรเปลี่ยน ให้ skip commit แทน error
            git diff --cached --quiet || git commit -m "chore: update positions.json [skip ci]"
            git push
          fi
